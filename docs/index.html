<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>デバイスニュース</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans",sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#f5f5f5}
.gate{background:#fff;padding:48px;border-radius:10px;box-shadow:0 2px 16px rgba(0,0,0,.08);text-align:center;max-width:360px;width:90%}
.gate h2{font-size:20px;color:#1a1a1a;margin-bottom:6px}
.gate p{font-size:13px;color:#888;margin-bottom:20px}
.gate input{width:100%;padding:12px;font-size:15px;border:1px solid #ddd;border-radius:6px;margin-bottom:14px;box-sizing:border-box}
.gate input:focus{outline:none;border-color:#C5A55A}
.gate button{width:100%;padding:12px;background:#C5A55A;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.04em}
.gate button:hover{background:#b8953e}
.gate .err{color:#e74c3c;font-size:13px;margin-top:8px;display:none}
</style></head><body>
<div class="gate" id="gate">
  <h2>📡 デバイスニュース</h2>
  <p>パスワードを入力してください</p>
  <input type="password" id="pw" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()" autofocus>
  <button onclick="doLogin()">ログイン</button>
  <p class="err" id="err">パスワードが違います</p>
</div>

async function sha256(s){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));return new Uint8Array(b)}
async function dec(pw){const k=await sha256(pw);const r=atob(D);const b=new Uint8Array(r.length);for(let i=0;i<r.length;i++)b[i]=r.charCodeAt(i)^k[i%k.length];return new TextDecoder().decode(b)}
function showReport(html){
  var doc=new DOMParser().parseFromString(html,"text/html");
  document.head.innerHTML=doc.head.innerHTML;
  document.body.innerHTML=doc.body.innerHTML;
  document.body.removeAttribute("style");
  document.body.className="";
  document.body.querySelectorAll("script").forEach(function(old){
    var s=document.createElement("script");s.textContent=old.textContent;
    old.parentNode.replaceChild(s,old);
  });
}
async function doLogin(){const pw=document.getElementById("pw").value;
  try{const h=await dec(pw);
    if(h.includes("<!DOCTYPE")||h.includes("<html")){
      localStorage.setItem("dn-pw",pw);showReport(h);}
    else{document.getElementById("err").style.display="block"}
  }catch(e){document.getElementById("err").style.display="block"}}
(async()=>{const s=localStorage.getItem("dn-pw");if(s){try{const h=await dec(s);

}catch(e){localStorage.removeItem("dn-pw")}}})();
